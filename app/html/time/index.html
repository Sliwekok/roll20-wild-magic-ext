<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Time</title>
    <link rel="stylesheet" href="../../css/app.css">
</head>
<style>
    body { font-family: Arial, sans-serif; margin: 16px; }
    .row { margin-bottom: 12px; }
    label { display:block; margin-bottom: 4px; font-weight:600; }
    input[type="text"], input[type="datetime-local"] { width: 100%; padding: 8px; box-sizing: border-box; }
    button { padding: 8px 12px; margin-right:8px; }
    ul { padding-left: 20px; }
    li { margin-bottom:8px; }
    .meta { color:#666; font-size:0.9em; }
</style>
<body id="wildMagicApp">
<div class="app" style="padding:12px; width:420px; height:600px;">
    <header class="header indexBtn">
        <img src="../../../assets/logo.jpg" alt="logo" class="logo">
        <h1 class="title">Time</h1>
    </header>

    <main>
        <div class="row">
            <label for="datetime">Wybierz datę i godzinę</label>
            <input id="datetime" type="datetime-local" />
        </div>

        <div class="row">
            <label for="label">Etykieta (opcjonalnie)</label>
            <input id="label" type="text" placeholder="np. Start turnieju, Przerwa ..." />
        </div>

        <div class="row">
            <button id="saveBtn">Zapisz</button>
            <button id="nowBtn">Zapisz teraz</button>
            <button id="clearBtn">Wyczyść historię</button>
        </div>

        <h3>Historia (ostatnie)</h3>
        <ul id="historyList"></ul>
    </main>

    <footer class="footer">
        <small>Historia rzutów lokalnie w extension storage</small>
    </footer>
</div>

<script type="module" src="../../js/popup.js"></script>
<script src="./time.js"></script>
</body>
</html>
